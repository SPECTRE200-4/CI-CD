version: "3.8"

services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker

    ports:
      - "9092:9092"

    environment:
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"

      # Core listener configuration (CRITICAL FIX)
      KAFKA_CFG_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"

      # Required for correct broker behavior in Docker
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Dev-friendly settings
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Retention tuning (safe defaults)
      KAFKA_CFG_LOG_RETENTION_HOURS: 12
      KAFKA_CFG_LOG_SEGMENT_BYTES: 104857600
      KAFKA_CFG_LOG_RETENTION_BYTES: 1073741824

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - edge-net

    # IMPORTANT: real readiness check (not just port check)
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  dashboard:
    build: ./dashboard
    image: ghcr.io/spectre200-4/ci-cd/dashboard:latest
    container_name: dashboard-ui

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=detections

    networks:
      - edge-net


  yolo-edge:
    build: ./yolo-edge
    image: ghcr.io/spectre200-4/ci-cd/yolo-edge:latest
    container_name: yolo-edge

    depends_on:
      kafka:
        condition: service_healthy

    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=detections
      - CAMERA_STREAM_URL=http://192.168.0.104:8080/video

    networks:
      - edge-net


networks:
  edge-net:
    driver: bridge


volumes:
  kafka-data:
