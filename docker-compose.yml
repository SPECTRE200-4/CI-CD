version: "3.8"

services:
  yolo-edge:
    build: ./yolo-edge
    image: ghcr.io/spectre200-4/ci-cd/yolo-edge:latest
    command: python app.py --source http://192.168.0.104:8080/video
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
    networks:
      - edge-net

  dashboard:
    build: ./dashboard
    image: ghcr.io/spectre200-4/ci-cd/dashboard:latest
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
    networks:
      - edge-net

  kafka:
    image: bitnami/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    networks:
      - edge-net

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"
    networks:
      - edge-net

networks:
  edge-net:
    driver: bridge
